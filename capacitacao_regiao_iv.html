<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Capacitação — OsteoPrevine Região IV</title>
<style>
*{{box-sizing:border-box;margin:0;padding:0}}
body{{font-family:Arial,sans-serif;background:#f0f4f8;min-height:100vh;padding:16px}}
.wrap{{max-width:600px;margin:0 auto}}
.header{{background:#1a5276;color:#fff;border-radius:12px 12px 0 0;padding:18px 20px}}
.header h1{{font-size:17px;font-weight:600}}
.header p{{font-size:13px;color:rgba(255,255,255,0.8);margin-top:4px}}
.card{{background:#fff;border:1px solid #dde3ea;padding:18px 20px;margin-top:12px;border-radius:12px}}
.label{{font-size:13px;font-weight:600;color:#222;margin-bottom:6px;display:block}}
.label span{{color:#c0392b;margin-left:2px}}
input[type=text],input[type=number],input[type=date]{{width:100%;padding:10px 12px;border:1px solid #ccd3db;border-radius:8px;font-size:14px;color:#222;background:#fff;outline:none}}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus{{border-color:#2980b9}}
.field{{margin-bottom:14px}}
.field:last-child{{margin-bottom:0}}
.checkbox-group{{display:flex;flex-direction:column;gap:10px}}
.checkbox-group label{{display:flex;align-items:center;gap:8px;font-size:14px;color:#222;cursor:pointer}}
.submit-btn{{width:100%;padding:13px;background:#1a5276;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px}}
.submit-btn:hover{{background:#154360}}
.submit-btn:disabled{{background:#95a5a6;cursor:not-allowed}}
.spinner{{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none}}
@keyframes spin{{to{{transform:rotate(360deg)}}}}
.success{{background:#d5f5e3;border:1px solid #27ae60;border-radius:12px;padding:20px;text-align:center;color:#1e8449;font-size:14px;margin-top:12px;display:none}}
.error{{background:#fadbd8;border:1px solid #e74c3c;border-radius:12px;padding:14px;text-align:center;color:#c0392b;font-size:13px;margin-top:12px;display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Registro de Capacitação — OsteoPrevine</h1>
    <p>Região IV — Preencha os dados da capacitação realizada</p>
  </div>
  <div class="card">
    <div class="field">
      <label class="label">Equipe de Saúde Capacitada<span>*</span></label>
      <input type="text" id="equipe" placeholder="Nome da equipe">
    </div>
    <div class="field">
      <label class="label">Responsável pela capacitação<span>*</span></label>
      <input type="text" id="responsavel" placeholder="Nome completo">
    </div>
    <div class="field">
      <label class="label">Data da capacitação<span>*</span></label>
      <input type="date" id="data">
    </div>
    <div class="field">
      <label class="label">Número de participantes<span>*</span></label>
      <input type="number" id="participantes" min="0" placeholder="0">
    </div>
    <div class="field" style="margin-bottom:0">
      <label class="label">Quais profissionais foram capacitados?<span>*</span></label>
      <div class="checkbox-group">
        <label><input type="checkbox" value="ACS/TACS"> ACS/TACS</label>
        <label><input type="checkbox" value="Técnico de Enfermagem"> Técnico de Enfermagem</label>
        <label><input type="checkbox" value="Auxiliar Administrativo"> Auxiliar Administrativo</label>
        <label><input type="checkbox" value="Auxiliar de Limpeza"> Auxiliar de Limpeza</label>
        <label><input type="checkbox" value="Outro"> Outro</label>
      </div>
    </div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="enviar()">
    <span id="submitTxt">Enviar registro</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <div class="error" id="erro">Erro ao enviar. Verifique sua conexão e tente novamente.</div>
  <div class="success" id="ok">
    <div style="font-size:36px;margin-bottom:8px">✓</div>
    <div style="font-weight:600;font-size:16px">Registro enviado com sucesso!</div>
    <div style="margin-top:6px">Os dados foram salvos na planilha.</div>
    <button onclick="novo()" style="margin-top:14px;padding:9px 24px;background:#27ae60;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600">Novo registro</button>
  </div>
</div>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw9Tj08sU2eKnZ4uJQY-ofzRJ92YhJrWEjs2vnafFzTKRFWTuSEMOFyEipNHRv4WDrazQ/exec";

async function enviar(){{
  const equipe = document.getElementById('equipe').value.trim();
  const responsavel = document.getElementById('responsavel').value.trim();
  const data = document.getElementById('data').value;
  const participantes = document.getElementById('participantes').value;
  const checks = [...document.querySelectorAll('.checkbox-group input:checked')].map(c => c.value);
  if(!equipe || !responsavel || !data || !participantes){{
    alert('Preencha todos os campos obrigatórios.'); return;
  }}
  if(checks.length === 0){{
    alert('Selecione ao menos um profissional capacitado.'); return;
  }}
  const btn = document.getElementById('submitBtn');
  const txt = document.getElementById('submitTxt');
  const spin = document.getElementById('spinner');
  const erro = document.getElementById('erro');
  erro.style.display = 'none';
  btn.disabled = true;
  txt.textContent = 'Enviando...';
  spin.style.display = 'block';
  const [ano, mes, dia] = data.split('-');
  const dataFormatada = `${{dia}}/${{mes}}/${{ano}}`;
  try {{
    await fetch(SCRIPT_URL, {{
      method: 'POST',
      mode: 'no-cors',
      headers: {{'Content-Type': 'application/json'}},
      body: JSON.stringify({{tipo: 'capacitacao', equipe, responsavel, data: dataFormatada, participantes, profissionais: checks.join(', ')}})
    }});
    document.getElementById('ok').style.display = 'block';
    btn.style.display = 'none';
  }} catch(e) {{
    erro.style.display = 'block';
    btn.disabled = false;
    txt.textContent = 'Enviar registro';
    spin.style.display = 'none';
  }}
}}

function novo(){{
  document.getElementById('equipe').value = '';
  document.getElementById('responsavel').value = '';
  document.getElementById('data').value = '';
  document.getElementById('participantes').value = '';
  document.querySelectorAll('.checkbox-group input').forEach(c => c.checked = false);
  document.getElementById('ok').style.display = 'none';
  document.getElementById('erro').style.display = 'none';
  const btn = document.getElementById('submitBtn');
  btn.style.display = 'flex';
  btn.disabled = false;
  document.getElementById('submitTxt').textContent = 'Enviar registro';
  document.getElementById('spinner').style.display = 'none';
}}
</script>
</body>
</html>
